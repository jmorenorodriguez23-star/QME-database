"lastName": "Yousefi", "specialty": "", "nature": "", "rating": "Unknown", "locations": "", "cases": "", "notes": ""}, {"id": 697, "title": "Dr.", "firstName": "Gary L.", "lastName": "Zagelbaum", "specialty": "", "nature": "Good", "rating": "Good", "locations": "", "cases": "", "notes": ""}, {"id": 698, "title": "Dr.", "firstName": "Bijan", "lastName": "Zardouz", "specialty": "", "nature": "", "rating": "Unknown", "locations": "", "cases": "", "notes": ""}, {"id": 699, "title": "Dr.", "firstName": "Raymond", "lastName": "Zarins", "specialty": "", "nature": "Bad", "rating": "Bad", "locations": "", "cases": "", "notes": ""}, {"id": 700, "title": "Dr.", "firstName": "", "lastName": "Zhalkovsky", "specialty": "psyche", "nature": "neutral", "rating": "Neutral", "locations": "", "cases": "Relonda McGhee", "notes": "pretty good report"}, {"id": 701, "title": "Dr.", "firstName": "Ronald", "lastName": "Zlotlow", "specialty": "", "nature": "Bad", "rating": "Bad", "locations": "", "cases": "", "notes": ""}, {"id": 702, "title": "Dr.", "firstName": "Rody", "lastName": "Zodkevitvh", "specialty": "", "nature": "Good", "rating": "Good", "locations": "", "cases": "", "notes": ""}];

const RATING_COLORS = {
  "Good":     { bg: "#dcfce7", text: "#166534", border: "#86efac" },
  "Bad":      { bg: "#fee2e2", text: "#991b1b", border: "#fca5a5" },
  "Very Bad": { bg: "#7f1d1d", text: "#fef2f2", border: "#991b1b" },
  "Neutral":  { bg: "#fef9c3", text: "#854d0e", border: "#fde047" },
  "Unknown":  { bg: "#f1f5f9", text: "#475569", border: "#cbd5e1" },
};

const RATING_LABELS = ["All","Good","Bad","Very Bad","Neutral","Unknown"];
const emptyForm = { firstName:"", lastName:"", specialty:"", nature:"", rating:"Unknown", locations:"", cases:"", notes:"" };

const storage = {
  get: (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; } },
  set: (key, value) => { try { localStorage.setItem(key, value); return true; } catch { return false; } },
};

function App() {
  const [doctors, setDoctors] = useState([]);
  const [search, setSearch] = useState("");
  const [filterRating, setFilterRating] = useState("All");
  const [selected, setSelected] = useState(null);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [aiQuery, setAiQuery] = useState("");
  const [aiResponse, setAiResponse] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState("");
  const nextId = useRef(10000);

  useEffect(() => {
    let merged = [...BASE_DOCTORS];
    try {
      const r = storage.get("qme_overrides");
      if (r) { const overrides = JSON.parse(r.value); merged = merged.map(d => overrides[d.id] ? { ...d, ...overrides[d.id] } : d); }
    } catch {}
    try {
      const r = storage.get("qme_additions");
      if (r) {
        const additions = JSON.parse(r.value);
        merged = [...merged, ...additions];
        const maxId = additions.reduce((m, d) => Math.max(m, d.id), 9999);
        nextId.current = maxId + 1;
      }
    } catch {}
    setDoctors(merged);
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

  const saveOverride = (updatedDoctor) => {
    setSaving(true);
    try {
      let overrides = {};
      const r = storage.get("qme_overrides");
      if (r) overrides = JSON.parse(r.value);
      overrides[updatedDoctor.id] = updatedDoctor;
      storage.set("qme_overrides", JSON.stringify(overrides));
      setDoctors(prev => prev.map(d => d.id === updatedDoctor.id ? updatedDoctor : d));
      if (selected?.id === updatedDoctor.id) setSelected(updatedDoctor);
      showToast("Saved.");
    } catch { showToast("Save failed."); }
    setSaving(false);
  };

  const saveAddition = (newDoctor) => {
    setSaving(true);
    try {
      let additions = [];
      const r = storage.get("qme_additions");
      if (r) additions = JSON.parse(r.value);
      additions.push(newDoctor);
      storage.set("qme_additions", JSON.stringify(additions));
      setDoctors(prev => [...prev, newDoctor]);
      showToast("Doctor added.");
    } catch { showToast("Save failed."); }
    setSaving(false);
  };

  const filtered = doctors.filter(d => {
    const q = search.toLowerCase();
    const matchSearch = !q ||
      (d.lastName||"").toLowerCase().includes(q) ||
      (d.firstName||"").toLowerCase().includes(q) ||
      (d.specialty||"").toLowerCase().includes(q) ||
      (d.notes||"").toLowerCase().includes(q) ||
      (d.cases||"").toLowerCase().includes(q);
    const matchRating = filterRating === "All" || d.rating === filterRating;
    return matchSearch && matchRating;
  });

  const openAdd = () => { setForm(emptyForm); setModal("add"); };
  const openEdit = (d) => { setForm({ ...d }); setModal("edit"); };

  const handleSave = () => {
    if (!form.lastName.trim()) { showToast("Last name is required."); return; }
    const normalized = { ...form, firstName: form.firstName.trim(), lastName: form.lastName.trim() };
    if (modal === "add") {
      const nd = { ...normalized, id: nextId.current++, title: "Dr." };
      saveAddition(nd);
      setSelected(nd);
    } else {
      saveOverride(normalized);
    }
    setModal(null);
  };

  const askAI = async () => {
    if (!aiQuery.trim()) return;
    setAiLoading(true);
    setAiResponse("");
    const dbSummary = doctors.map(d =>
      `${d.firstName} ${d.lastName}|${d.specialty||""}|${d.rating}|${d.nature||""}|${d.locations||""}|${d.notes||""}`
    ).join("\n");
    const systemPrompt = `You are a California workers compensation defense attorneys internal QME/AME doctor database assistant. Answer questions about doctors based on the database below. Be concise and direct. Format: Dr. [Name] - [rating]: [notes]. If not found, say so.\n\nDATABASE (Name|Specialty|Rating|Nature|Location|Notes):\n${dbSummary}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: aiQuery }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("") || "No response.";
      setAiResponse(text);
    } catch { setAiResponse("Error reaching AI. Check your connection."); }
    setAiLoading(false);
  };

  const counts = { Good:0, Bad:0, "Very Bad":0, Neutral:0, Unknown:0 };
  doctors.forEach(d => { if (counts[d.rating] !== undefined) counts[d.rating]++; });
  const c = RATING_COLORS;

  return (
    <div style={{ fontFamily:"system-ui,-apple-system,sans-serif", background:"#f8fafc", height:"100vh", display:"flex", flexDirection:"column", overflow:"hidden" }}>

      <div style={{ background:"#1e293b", color:"white", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700 }}>QME/AME Doctor Database</div>
          <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{doctors.length} doctors</div>
        </div>
        <button onClick={openAdd} style={{ background:"#3b82f6", color:"white", border:"none", borderRadius:8, padding:"8px 16px", fontSize:13, fontWeight:600, cursor:"pointer" }}>+ Add Doctor</button>
      </div>

      <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", padding:"8px 24px", display:"flex", gap:16, flexShrink:0, flexWrap:"wrap" }}>
        {Object.entries(counts).map(([k,v]) => (
          <div key={k} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
            <span style={{ background:c[k].bg, color:c[k].text, border:`1px solid ${c[k].border}`, borderRadius:4, padding:"2px 7px", fontWeight:600 }}>{k}</span>
            <span style={{ color:"#64748b" }}>{v}</span>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        <div style={{ width:320, borderRight:"1px solid #e2e8f0", background:"#fff", display:"flex", flexDirection:"column", overflow:"hidden", flexShrink:0 }}>
          <div style={{ padding:"12px 12px 8px", flexShrink:0 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, specialty, case…"
              style={{ width:"100%", padding:"8px 12px", border:"1px solid #cbd5e1", borderRadius:8, fontSize:13, outline:"none" }} />
            <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:8 }}>
              {RATING_LABELS.map(r => (
                <button key={r} onClick={() => setFilterRating(r)}
                  style={{ fontSize:11, padding:"3px 9px", borderRadius:20, border:"1px solid", cursor:"pointer", fontWeight:600,
                    background: filterRating===r ? "#1e293b" : "#f1f5f9",
                    color: filterRating===r ? "white" : "#475569",
                    borderColor: filterRating===r ? "#1e293b" : "#cbd5e1" }}>
                  {r} ({r==="All" ? doctors.length : counts[r]||0})
                </button>
              ))}
            </div>
            <div style={{ fontSize:11, color:"#94a3b8", marginTop:6 }}>{filtered.length} results</div>
          </div>
          <div style={{ overflowY:"auto", flex:1 }}>
            {filtered.map(d => {
              const col = c[d.rating]||c.Unknown;
              const isSel = selected?.id===d.id;
              return (
                <div key={d.id} onClick={() => setSelected(d)}
                  style={{ padding:"10px 14px", cursor:"pointer", borderBottom:"1px solid #f1f5f9",
                    background: isSel ? "#eff6ff" : "white",
                    borderLeft: isSel ? "3px solid #3b82f6" : "3px solid transparent" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{d.firstName} {d.lastName}</div>
                    <span style={{ fontSize:10, fontWeight:700, padding:"2px 6px", borderRadius:4, background:col.bg, color:col.text, border:`1px solid ${col.border}`, whiteSpace:"nowrap" }}>{d.rating}</span>
                  </div>
                  {d.specialty && <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{d.specialty}</div>}
                  {d.locations && <div style={{ fontSize:11, color:"#94a3b8" }}>{d.locations}</div>}
                </div>
              );
            })}
            {filtered.length===0 && <div style={{ padding:24, textAlign:"center", color:"#94a3b8", fontSize:13 }}>No results found.</div>}
          </div>
        </div>

        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ flex:1, overflowY:"auto", padding:24 }}>
            {!selected ? (
              <div style={{ textAlign:"center", color:"#94a3b8", paddingTop:60 }}>
                <div style={{ fontSize:40, marginBottom:12 }}>🏥</div>
                <div style={{ fontSize:16, fontWeight:600, color:"#475569" }}>Select a doctor to view details</div>
                <div style={{ fontSize:13, marginTop:4 }}>or use the AI Query below</div>
              </div>
            ) : (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                  <div>
                    <div style={{ fontSize:22, fontWeight:700, color:"#1e293b" }}>Dr. {selected.firstName} {selected.lastName}</div>
                    {selected.specialty && <div style={{ color:"#64748b", fontSize:14, marginTop:2 }}>{selected.specialty}</div>}
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                    <span style={{ fontSize:13, fontWeight:700, padding:"5px 12px", borderRadius:6,
                      background:(c[selected.rating]||c.Unknown).bg,
                      color:(c[selected.rating]||c.Unknown).text,
                      border:`1px solid ${(c[selected.rating]||c.Unknown).border}` }}>{selected.rating}</span>
                    <button onClick={() => openEdit(selected)} style={{ background:"#f1f5f9", border:"1px solid #cbd5e1", borderRadius:6, padding:"5px 12px", fontSize:12, cursor:"pointer", color:"#475569" }}>Edit</button>
                  </div>
                </div>
                {[
                  ["Nature / Assessment", selected.nature],
                  ["Specialty", selected.specialty],
                  ["Location(s)", selected.locations],
                  ["Associated Cases", selected.cases],
                  ["Notes", selected.notes],
                ].map(([label,val]) => val ? (
                  <div key={label} style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:4 }}>{label}</div>
                    <div style={{ fontSize:13, color:"#334155", background:"#f8fafc", padding:"8px 12px", borderRadius:6, border:"1px solid #e2e8f0" }}>{val}</div>
                  </div>
                ) : null)}
              </div>
            )}
          </div>

          <div style={{ borderTop:"1px solid #e2e8f0", background:"#fff", padding:"16px 24px", flexShrink:0 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#475569", marginBottom:8, textTransform:"uppercase", letterSpacing:"0.5px" }}>AI Query</div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={aiQuery} onChange={e => setAiQuery(e.target.value)}
                onKeyDown={e => e.key==="Enter" && askAI()}
                placeholder="e.g. 'Tell me about Dr. Brourman' or 'Good ortho QMEs in LA'"
                style={{ flex:1, padding:"8px 12px", border:"1px solid #cbd5e1", borderRadius:8, fontSize:13, outline:"none" }} />
              <button onClick={askAI} disabled={aiLoading}
                style={{ background:"#1e293b", color:"white", border:"none", borderRadius:8, padding:"8px 16px", fontSize:13, fontWeight:600, cursor:aiLoading?"not-allowed":"pointer", opacity:aiLoading?0.7:1 }}>
                {aiLoading ? "…" : "Ask"}
              </button>
            </div>
            {aiResponse && (
              <div style={{ marginTop:10, background:"#f0f9ff", border:"1px solid #bae6fd", borderRadius:8, padding:"10px 14px", fontSize:13, color:"#0c4a6e", whiteSpace:"pre-wrap", maxHeight:160, overflowY:"auto" }}>
                {aiResponse}
              </div>
            )}
          </div>
        </div>
      </div>

      {modal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
          <div style={{ background:"white", borderRadius:12, padding:28, width:480, maxHeight:"85vh", overflowY:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:20, color:"#1e293b" }}>
              {modal==="add" ? "Add New Doctor" : `Edit — Dr. ${form.firstName} ${form.lastName}`}
            </div>
            {[["First Name","firstName"],["Last Name *","lastName"],["Specialty","specialty"],["Locations","locations"],["Associated Cases","cases"]].map(([label,key]) => (
              <div key={key} style={{ marginBottom:12 }}>
                <label style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase" }}>{label}</label>
                <input value={form[key]||""} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                  style={{ display:"block", width:"100%", padding:"7px 10px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:13, marginTop:3 }} />
              </div>
            ))}
            <div style={{ marginBottom:12 }}>
              <label style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase" }}>Rating</label>
              <select value={form.rating} onChange={e => setForm(f => ({ ...f, rating: e.target.value }))}
                style={{ display:"block", width:"100%", padding:"7px 10px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:13, marginTop:3 }}>
                {["Good","Neutral","Bad","Very Bad","Unknown"].map(r => <option key={r}>{r}</option>)}
              </select>
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase" }}>Nature / Description</label>
              <input value={form.nature||""} onChange={e => setForm(f => ({ ...f, nature: e.target.value }))}
                style={{ display:"block", width:"100%", padding:"7px 10px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:13, marginTop:3 }} />
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={{ fontSize:11, fontWeight:600, color:"#64748b", textTransform:"uppercase" }}>Notes</label>
              <textarea value={form.notes||""} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={3}
                style={{ display:"block", width:"100%", padding:"7px 10px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:13, marginTop:3, resize:"vertical" }} />
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <button onClick={() => setModal(null)} style={{ padding:"8px 16px", borderRadius:7, border:"1px solid #cbd5e1", background:"white", fontSize:13, cursor:"pointer" }}>Cancel</button>
              <button onClick={handleSave} disabled={saving}
                style={{ padding:"8px 18px", borderRadius:7, border:"none", background:"#1e293b", color:"white", fontSize:13, fontWeight:600, cursor:saving?"not-allowed":"pointer", opacity:saving?0.7:1 }}>
                {saving ? "Saving…" : "Save"}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:"#1e293b", color:"white", padding:"10px 20px", borderRadius:8, fontSize:13, fontWeight:600, zIndex:200 }}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
